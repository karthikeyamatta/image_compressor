<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPF Image Compressor</title>
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://cdn.jsdelivr.net; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' blob: data:; connect-src 'self' blob: https://cdn.jsdelivr.net;">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0c0c0e;
            --card-bg: #16161a;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #05070a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            padding: 40px 0;
        }

        /* Abstract glowing blobs */
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, #00f2ff 0%, #7000ff 100%);
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
        }

        .blob-1 {
            top: -100px;
            left: -100px;
        }

        .blob-2 {
            bottom: -100px;
            right: -100px;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin-top: 60px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00f2ff 0%, #7000ff 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        header p {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            max-width: 600px;
            margin: 0 auto;
        }

        .drop-zone {
            background: rgba(255, 255, 255, 0.03);
            border: 2px dashed rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 60px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            border-color: #00f2ff;
            background: rgba(0, 242, 255, 0.1);
            transform: translateY(-5px);
        }

        .drop-zone h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .drop-zone p {
            color: rgba(255, 255, 255, 0.4);
        }

        .hidden-input {
            display: none;
        }

        .status-container {
            display: none;
            margin-top: 2rem;
            animation: fadeIn 0.5s ease;
            width: 100%;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid var(--accent);
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 2rem;
        }

        .metric-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .metric-value {
            display: block;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--success);
            margin-top: 0.5rem;
        }

        .metric-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .success-banner {
            margin-top: 2rem;
            color: var(--success);
            font-weight: 600;
            display: none;
        }

        .reset-btn {
            margin-top: 2rem;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .reset-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
            filter: brightness(1.1);
        }

        .preview-container {
            margin-top: 2rem;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #export-canvas {
            max-width: 100%;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .download-btn {
            background: var(--success);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            margin-top: 1.5rem;
            display: inline-block;
        }

        .download-btn:hover {
            filter: brightness(1.1);
            transform: scale(1.05);
        }

        nav {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 20px;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        nav a:hover {
            color: var(--accent);
        }
    </style>
</head>

<body>
    <nav>
        <a href="index.html" style="color: var(--accent)">Compressor</a>
        <a href="about.html">About & Privacy</a>
    </nav>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="container">


        <div class="drop-zone" id="dropZone">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 20px">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="17 8 12 3 7 8"></polyline>
                <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <h3>Drop your high-fidelity image here</h3>
            <p>JPG, PNG, WebP, or HEIC. Automatic Compression for 10MB+ photography.</p>
            <input type="file" id="fileInput" class="hidden-input" accept="image/*,.heic,.heif">
        </div>

        <div class="status-container" id="status">
            <div id="processing">
                <span class="loader"></span>
                <p style="margin-top: 1rem;">Compressing the Image...</p>
            </div>

            <div id="results" style="display: none;">
                <div class="preview-container">
                    <canvas id="export-canvas"></canvas>
                </div>

                <div class="metrics">
                    <div class="metric-card">
                        <span class="metric-label">Original</span>
                        <span class="metric-value" id="orig-size">0 KB</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Optimized Size</span>
                        <span class="metric-value" id="upf-size">0 KB</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Reduction</span>
                        <span class="metric-value" id="reduction">0%</span>
                    </div>
                </div>
                <div class="success-banner" id="success-msg">✅ Image is Ready!</div>
                <a id="download-trigger" class="download-btn" href="#">DOWNLOAD THE IMAGE</a>
                <br>
                <button class="reset-btn" onclick="resetExport()">Compress Another Image</button>
            </div>
        </div>
    </div>

    <script type="module" src="newjpeg.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/heic-to@1.4.2/dist/iife/heic-to.min.js"></script>
    <script>
        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const status = document.getElementById('status');
        const processing = document.getElementById('processing');
        const results = document.getElementById('results');
        const origSizeEl = document.getElementById('orig-size');
        const upfSizeEl = document.getElementById('upf-size');
        const reductionEl = document.getElementById('reduction');
        const successMsg = document.getElementById('success-msg');
        const downloadTrigger = document.getElementById('download-trigger');
        const exportCanvas = document.getElementById('export-canvas');

        let originalFile = null;

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        dropZone.onclick = () => fileInput.click();

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        async function handleFile(file) {
            originalFile = file;
            dropZone.style.display = 'none';
            status.style.display = 'block';
            origSizeEl.textContent = `${(file.size / 1024).toFixed(1)} KB`;

            let targetFile = file;
            if (file.name.toLowerCase().endsWith('.heic') || file.name.toLowerCase().endsWith('.heif')) {
                console.log("HEIC file detected, starting conversion via heic-to...");
                try {
                    // heic-to API: HeicTo({ blob, type, quality })
                    const convertedBlob = await HeicTo({
                        blob: file,
                        type: 'image/jpeg',
                        quality: 0.8
                    });
                    targetFile = Array.isArray(convertedBlob) ? convertedBlob[0] : convertedBlob;
                    console.log("HEIC conversion successful");
                } catch (e) {
                    console.error("HEIC Conversion failed:", e);
                    alert("HEIC conversion failed: " + (e.message || "The file might be incompatible or corrupted."));
                    resetExport();
                    return;
                }
            }

            // Call the WASM processor
            // window.processUserUpload is exposed in newjpeg.js
            if (window.processUserUpload) {
                window.processUserUpload(targetFile, originalFile.name);
            }
        }

        window.onExportComplete = (upfSizeBytes, blobUrl, filename) => {
            processing.style.display = 'none';
            results.style.display = 'block';
            upfSizeEl.textContent = `${(upfSizeBytes / 1024).toFixed(1)} KB`;

            // Calculate reduction
            if (originalFile) {
                const reduction = ((1 - upfSizeBytes / originalFile.size) * 100).toFixed(1);
                reductionEl.textContent = `${reduction}%`;
            }

            successMsg.style.display = 'block';

            // Set up download button
            downloadTrigger.href = blobUrl;
            downloadTrigger.download = filename;
        };

        function resetExport() {
            results.style.display = 'none';
            status.style.display = 'none';
            processing.style.display = 'block';
            successMsg.style.display = 'none';
            dropZone.style.display = 'block';
            fileInput.value = '';
            originalFile = null;
        }

        window.resetExport = resetExport;
    </script>
</body>

</html>
